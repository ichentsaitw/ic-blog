<style>
  :root {
    --bg: #F9F7F4;
    --card-bg: #FFFFFF;
    --header-bg: #1A1814;
    --text: #2C2825;
    --text-light: #6B6460;
    --text-muted: #A89890;
    --border: #EAE4DC;
    --accent: #C8602A;
    --accent-light: #FDF0E8;
    --accent-dark: #A0481C;
    --shadow-sm: 0 1px 4px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.04);
    --shadow-md: 0 2px 8px rgba(0,0,0,0.08), 0 8px 32px rgba(0,0,0,0.06);
    --radius: 16px;
    --max-width: 1280px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Noto Sans TC', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.7;
    -webkit-font-smoothing: antialiased;
  }

  /* ===== HEADER ===== */
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--header-bg);
    border-bottom: 1px solid rgba(255,255,255,0.06);
    backdrop-filter: blur(12px);
  }

  .header-inner {
    max-width: var(--max-width);
    margin: 0 auto;
    padding: 0 24px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
    flex-shrink: 0;
  }

  .logo-icon {
    width: 34px;
    height: 34px;
    background: var(--accent);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Noto Serif TC', serif;
    font-weight: 700;
    font-size: 14px;
    color: white;
    letter-spacing: -0.5px;
  }

  .logo-text {
    font-family: 'Noto Serif TC', serif;
    font-weight: 700;
    font-size: 17px;
    color: white;
    letter-spacing: 0.5px;
  }

  /* Desktop nav */
  .nav-desktop {
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .nav-desktop a {
    color: rgba(255,255,255,0.7);
    text-decoration: none;
    font-size: 14px;
    padding: 6px 12px;
    border-radius: 8px;
    transition: all 0.2s;
  }

  .nav-desktop a:hover {
    color: white;
    background: rgba(255,255,255,0.08);
  }

  /* Hamburger */
  .hamburger {
    display: none;
    background: none;
    border: none;
    cursor: pointer;
    padding: 8px;
    border-radius: 8px;
    color: white;
    transition: background 0.2s;
  }

  .hamburger:hover { background: rgba(255,255,255,0.08); }

  .hamburger svg { display: block; }

  /* Mobile menu */
  .mobile-menu {
    display: none;
    position: fixed;
    top: 60px;
    left: 0;
    right: 0;
    background: #1A1814;
    border-bottom: 1px solid rgba(255,255,255,0.1);
    z-index: 99;
    padding: 12px 16px 16px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  }

  .mobile-menu.open { display: block; }

  .mobile-menu a {
    display: block;
    color: rgba(255,255,255,0.8);
    text-decoration: none;
    font-size: 15px;
    padding: 12px 16px;
    border-radius: 10px;
    transition: all 0.2s;
  }

  .mobile-menu a:hover {
    color: white;
    background: rgba(255,255,255,0.08);
  }

  /* ===== HERO ===== */
  .hero {
    background: linear-gradient(135deg, #1A1814 0%, #2D2318 60%, #3A2A18 100%);
    padding: 64px 24px 56px;
    text-align: center;
  }

  .hero-label {
    display: inline-block;
    background: var(--accent);
    color: white;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 4px 12px;
    border-radius: 20px;

  }

  .hero h1 {
    font-family: 'Noto Serif TC', serif;
    font-size: clamp(28px, 5vw, 48px);
    font-weight: 700;
    color: white;
    line-height: 1.3;
    margin-bottom: 16px;
    letter-spacing: 1px;
  }

  .hero p {
    font-size: 15px;
    color: rgba(255,255,255,0.6);
    max-width: 480px;
    margin: 0 auto 32px;
    line-height: 1.8;
  }

  /* ===== SUPABASE COUNTER ===== */
  .counter-bar {
    display: flex;
    justify-content: center;
    gap: 32px;
    padding: 24px;
    background: var(--card-bg);
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }

  .counter-item {
    text-align: center;
  }

  .counter-number {
    font-family: 'Noto Serif TC', serif;
    font-size: 28px;
    font-weight: 700;
    color: var(--accent);
    display: block;
    line-height: 1;
    margin-bottom: 4px;
  }

  .counter-label {
    font-size: 12px;
    color: var(--text-muted);
    letter-spacing: 0.5px;
  }

  .trend-mini {
    width: 120px;
    height: 40px;
  }

  /* ===== CATEGORY FILTER ===== */
  .category-section {
    max-width: var(--max-width);
    margin: 0 auto;
    padding: 28px 24px 0;
  }

  .category-scroll {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding-bottom: 4px;
    scrollbar-width: none;
    -ms-overflow-style: none;
  }

  .category-scroll::-webkit-scrollbar { display: none; }

  .cat-btn {
    flex-shrink: 0;
    padding: 8px 18px;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    background: var(--card-bg);
    color: var(--text-light);
    font-size: 14px;
    font-family: 'Noto Sans TC', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .cat-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .cat-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
    font-weight: 500;
  }

  /* ===== ARTICLE GRID ===== */
  .articles-section {
    max-width: var(--max-width);
    margin: 0 auto;
    padding: 28px 24px 64px;
  }

  .articles-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 24px;
  }

  @media (max-width: 900px) {
    .articles-grid { grid-template-columns: repeat(2, 1fr); }
  }

  @media (max-width: 580px) {
    .articles-grid { grid-template-columns: 1fr; gap: 16px; }
  }

  /* ===== ARTICLE CARD ===== */
  .article-card {
    background: var(--card-bg);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: var(--shadow-sm);
    transition: transform 0.25s, box-shadow 0.25s;
    border: 1px solid var(--border);
    text-decoration: none;
    color: inherit;
    display: flex;
    flex-direction: column;

    /* For lazy reveal animation */
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 0.4s ease, transform 0.4s ease, box-shadow 0.25s;
  }

  .article-card.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .article-card:hover {
    transform: translateY(-4px);
    box-shadow: var(--shadow-md);
  }

  .card-image-wrap {
    position: relative;
    aspect-ratio: 16 / 9;
    overflow: hidden;
    background: #EEE;
  }

  .card-image-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.4s ease;
    display: block;
  }

  .article-card:hover .card-image-wrap img {
    transform: scale(1.04);
  }

  .card-category {
    position: absolute;
    top: 12px;
    left: 12px;
    background: var(--accent);
    color: white;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.8px;
    padding: 3px 10px;
    border-radius: 12px;
  }

  .card-body {
    padding: 20px 20px 18px;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .card-meta {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 12px;
    color: var(--text-muted);
  }

  .card-date::before { content: "📅 "; font-size: 10px; }
  .card-read::before { content: "⏱ "; font-size: 10px; }

  .card-title {
    font-family: 'Noto Serif TC', serif;
    font-size: 17px;
    font-weight: 700;
    color: var(--text);
    line-height: 1.5;
    letter-spacing: 0.3px;
  }

  .card-excerpt {
    font-size: 14px;
    color: var(--text-light);
    line-height: 1.7;
    flex: 1;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .card-read-more {
    font-size: 13px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.3px;
    margin-top: 4px;
    display: flex;
    align-items: center;
    gap: 4px;
    transition: gap 0.2s;
  }

  .article-card:hover .card-read-more { gap: 8px; }

  /* ===== LOAD MORE ===== */
  .load-trigger {
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .load-spinner {
    display: none;
    width: 28px;
    height: 28px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  .load-spinner.active { display: block; }

  @keyframes spin { to { transform: rotate(360deg); } }

  .no-more-msg {
    font-size: 13px;
    color: var(--text-muted);
    display: none;
  }

  /* ===== EMPTY STATE ===== */
  .empty-state {
    text-align: center;
    padding: 80px 24px;
    color: var(--text-muted);
    display: none;
  }

  .empty-state .empty-icon { font-size: 48px; margin-bottom: 16px; }
  .empty-state p { font-size: 15px; }

  /* ===== FOOTER ===== */
  footer {
    background: var(--header-bg);
    color: rgba(255,255,255,0.5);
    text-align: center;
    padding: 32px 24px;
    font-size: 13px;
    line-height: 2;
  }

  footer a {
    color: var(--accent);
    text-decoration: none;
    font-weight: 500;
  }

  footer a:hover { text-decoration: underline; }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 768px) {
    .nav-desktop { display: none; }
    .hamburger { display: flex; }
    .hero { padding: 48px 20px 40px; }
    .counter-bar { padding: 16px 20px; gap: 24px; }
    .category-section { padding: 20px 16px 0; }
    .articles-section { padding: 20px 16px 48px; }
  }
</style>
</head>

<script>
// ===== CONFIG =====
const SUPABASE_URL = 'https://dypkogwrsqtonefaodiv.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR5cGtvZ3dyc3F0b25lZmFvZGl2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0MDg2NzMsImV4cCI6MjA4OTk4NDY3M30.Qqh4V7_yumS5TnrV5Eora6VrC3T1bjbdTl7Pd2s-Tw4';
const SITE_ID = 'ic-blog-gh';
const POSTS_PER_PAGE = 6;

// ===== STATE =====
let allPosts = [];
let filteredPosts = [];
let displayedCount = 0;
let currentCategory = '全部';
let isLoading = false;
let trendChartInstance = null;

// ===== INIT =====
document.addEventListener('DOMContentLoaded', async () => {
  await loadPosts();
  initSupabase();
  initHamburger();
});

// ===== LOAD POSTS =====
async function loadPosts() {
  try {
    const res = await fetch('posts/data.json?t=' + Date.now());
    const data = await res.json();
    allPosts = data.posts || [];
    allPosts.sort((a, b) => new Date(b.date) - new Date(a.date));

    const categories = ['全部', ...new Set(allPosts.map(p => p.category))];
    renderCategoryNav(categories);

    document.getElementById('postCount').textContent = allPosts.length;
    filterCategory('全部');
  } catch (e) {
    console.error('Failed to load posts:', e);
    document.getElementById('postCount').textContent = '0';
    filterCategory('全部');
  }
}

// ===== CATEGORY NAV =====
function renderCategoryNav(categories) {
  const desktopNav = document.getElementById('catNavDesktop');
  const mobileMenu = document.getElementById('mobileMenu');
  const catScroll = document.getElementById('catScroll');

  desktopNav.innerHTML = '';
  mobileMenu.innerHTML = '';
  catScroll.innerHTML = '';

  categories.forEach(cat => {
    // Desktop nav
    const a = document.createElement('a');
    a.href = '#';
    a.textContent = cat;
    a.addEventListener('click', e => { e.preventDefault(); filterCategory(cat); toggleMobile(false); });
    desktopNav.appendChild(a);

    // Mobile menu
    const mobileA = document.createElement('a');
    mobileA.href = '#';
    mobileA.textContent = cat;
    mobileA.addEventListener('click', e => { e.preventDefault(); filterCategory(cat); toggleMobile(false); });
    mobileMenu.appendChild(mobileA);

    // Category scroll bar
    const btn = document.createElement('button');
    btn.className = 'cat-btn' + (cat === currentCategory ? ' active' : '');
    btn.textContent = cat;
    btn.dataset.cat = cat;
    btn.addEventListener('click', () => filterCategory(cat));
    catScroll.appendChild(btn);
  });
}

// ===== FILTER =====
function filterCategory(cat) {
  currentCategory = cat;
  filteredPosts = cat === '全部' ? [...allPosts] : allPosts.filter(p => p.category === cat);
  displayedCount = 0;

  document.getElementById('articlesGrid').innerHTML = '';
  document.getElementById('noMoreMsg').style.display = 'none';

  // Update active states
  document.querySelectorAll('.cat-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.cat === cat);
  });
  document.querySelectorAll('#catNavDesktop a').forEach((a, i) => {
    const cats = ['全部', ...new Set(allPosts.map(p => p.category))];
    a.style.color = cats[i] === cat ? 'white' : 'rgba(255,255,255,0.7)';
    a.style.background = cats[i] === cat ? 'rgba(200,96,42,0.3)' : '';
  });

  loadMore();
}

// ===== LOAD MORE =====
function loadMore() {
  if (isLoading) return;
  const grid = document.getElementById('articlesGrid');
  const empty = document.getElementById('emptyState');

  if (filteredPosts.length === 0) {
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  const batch = filteredPosts.slice(displayedCount, displayedCount + POSTS_PER_PAGE);
  if (batch.length === 0) {
    document.getElementById('noMoreMsg').style.display = 'block';
    return;
  }

  isLoading = true;
  document.getElementById('loadSpinner').classList.add('active');

  setTimeout(() => {
    batch.forEach((post, idx) => {
      const card = createCard(post);
      grid.appendChild(card);
      // Stagger reveal animation
      setTimeout(() => card.classList.add('visible'), idx * 60);
    });

    displayedCount += batch.length;
    isLoading = false;
    document.getElementById('loadSpinner').classList.remove('active');

    if (displayedCount >= filteredPosts.length) {
      document.getElementById('noMoreMsg').style.display = displayedCount > POSTS_PER_PAGE ? 'block' : 'none';
    }
  }, 200);
}

// ===== CREATE CARD =====
function createCard(post) {
  const a = document.createElement('a');
  a.className = 'article-card';
  a.href = 'posts/' + post.slug + '.html';

  const dateStr = formatDate(post.date);
  const readMin = post.readingTime || 5;

  a.innerHTML = `
    <div class="card-image-wrap">
      <img src="${post.image}" alt="${post.title}" loading="lazy">
      <span class="card-category">${post.category}</span>
    </div>
    <div class="card-body">
      <div class="card-meta">
        <span class="card-date">${dateStr}</span>
        <span class="card-read">${readMin} 分鐘</span>
      </div>
      <div class="card-title">${post.title}</div>
      <div class="card-excerpt">${post.excerpt}</div>
      <div class="card-read-more">閱讀全文 →</div>
    </div>
  `;
  return a;
}

// ===== HELPERS =====
function formatDate(dateStr) {
  const d = new Date(dateStr);
  return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
}

// ===== INTERSECTION OBSERVER (lazy load on scroll) =====
const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if (entry.isIntersecting && !isLoading) {
      loadMore();
    }
  });
}, { rootMargin: '200px' });

observer.observe(document.getElementById('loadTrigger'));

// ===== HAMBURGER =====
function initHamburger() {
  const btn = document.getElementById('hamburgerBtn');
  btn.addEventListener('click', () => {
    const open = document.getElementById('mobileMenu').classList.contains('open');
    toggleMobile(!open);
  });
  document.addEventListener('click', e => {
    if (!e.target.closest('header') && !e.target.closest('.mobile-menu')) {
      toggleMobile(false);
    }
  });
}

function toggleMobile(open) {
  const menu = document.getElementById('mobileMenu');
  const btn = document.getElementById('hamburgerBtn');
  menu.classList.toggle('open', open);
  btn.setAttribute('aria-expanded', open);
}

// ===== SUPABASE COUNTER =====
async function initSupabase() {
  try {
    // Increment + get total
    const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/increment_page_view`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`
      },
      body: JSON.stringify({ site: SITE_ID })
    });
    const total = await res.json();
    animateCount(document.getElementById('totalViews'), total);

    // Get 7-day trend
    const trend = await fetch(
      `${SUPABASE_URL}/rest/v1/page_views?site_id=eq.${SITE_ID}&order=view_date.desc&limit=7`,
      { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } }
    );
    const trendData = await trend.json();
    renderTrendChart(trendData.reverse());
  } catch (e) {
    document.getElementById('totalViews').textContent = '—';
    console.error('Supabase error:', e);
  }
}

function animateCount(el, target) {
  const duration = 1200;
  const start = performance.now();
  const animate = (now) => {
    const progress = Math.min((now - start) / duration, 1);
    const eased = 1 - Math.pow(1 - progress, 3);
    el.textContent = Math.floor(eased * target).toLocaleString();
    if (progress < 1) requestAnimationFrame(animate);
  };
  requestAnimationFrame(animate);
}

function renderTrendChart(data) {
  const canvas = document.getElementById('trendChart');
  const ctx = canvas.getContext('2d');

  const labels = data.map(d => {
    const dt = new Date(d.view_date);
    return `${dt.getMonth()+1}/${dt.getDate()}`;
  });
  const counts = data.map(d => d.count);

  if (trendChartInstance) trendChartInstance.destroy();
  trendChartInstance = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        data: counts,
        borderColor: '#C8602A',
        backgroundColor: 'rgba(200,96,42,0.15)',
        fill: true,
        tension: 0.4,
        pointRadius: 0,
        borderWidth: 2
      }]
    },
    options: {
      responsive: false,
      plugins: { legend: { display: false }, tooltip: { enabled: false } },
      scales: { x: { display: false }, y: { display: false } },
      animation: { duration: 800 }
    }
  });
}
